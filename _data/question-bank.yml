      disciplined-value: +2 # Healing requires patience
      inspirational-leader: +1 # Support the team
      holy-power: +1 # Divine might for protection
      utility-magic: +1 # Support often includes utility spells
      damage-magic: -2 # Moderate opposition to offensive magic
      reckless-value: -2 # Against aggression and recklessness
    "maybe":
