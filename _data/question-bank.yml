# Class Selector Question Bank
# Questions designed to map player preferences to class/archetype traits.
# Each question can influence multiple trait categories with different weights.

# ========================================
# MULTI-DIMENSIONAL TRAIT SCORING SYSTEM
# ========================================
#
# CORE PRINCIPLE:
# Every answer contributes positive or negative scores across MULTIPLE trait dimensions
# simultaneously. This creates a nuanced profile showing both strengths (high scores)
# and aversions (negative scores).
#
# HOW IT WORKS:
#
# 1. Each question can score multiple traits in different directions:
#    Example:
#      - id: healing-magic
#        text: "Do you want to heal and protect your allies?"
#        answers:
#          "yes":
#            healing-magic: +4      # Strong preference FOR healing
#            damage-magic: -2       # Moderate aversion AGAINST damage
#            utility-magic: +1      # Slight lean toward utility
#          "no":
#            healing-magic: -2      # Aversion to healing
#            damage-magic: +4       # Strong preference for damage
#
# 2. Score Accumulation:
#    - As player answers questions, each trait accumulates scores
#    - current_score = sum(all_answers_affecting_this_trait)
#    - Track min/max possible: What's the lowest/highest score achievable?
#
# 3. Percentage Calculation:
#    - If possible range is -10 to +20:
#      * Score of +15 = 83% alignment ((15 - (-10)) / (20 - (-10)) = 25/30)
#      * Score of 0 = 33% alignment ((0 - (-10)) / 30 = 10/30)
#      * Score of -8 = 7% alignment ((-8 - (-10)) / 30 = 2/30)
#
# 4. Matching to Classes:
#    - Classes define which traits they need (e.g., Cleric needs healing-magic)
#    - Player's score percentage in those traits determines class fit
#    - Higher percentage in matched traits = better recommendation
#
# EXAMPLE FLOW:
#   Questions asked:
#     Q1: "Want to heal allies?" → YES → healing-magic: +4, damage-magic: -2
#     Q2: "Want damage spells?" → NO  → healing-magic: +2, damage-magic: -4
#     Q3: "Interested in magic?" → YES → utility-magic: +2
#
#   Player's accumulated scores:
#     healing-magic: +6 (range -4 to +10) = 71% alignment
#     damage-magic: -6 (range -10 to +8) = 22% alignment
#     utility-magic: +5 (range -2 to +12) = 50% alignment
#
#   Class matching:
#     Cleric (wants healing-magic): 71% match ✅
#     Wizard (wants damage-magic): 22% match ❌
#
# KEY ADVANTAGES:
#   - Natural questions ("Do you want X?") instead of rating scales
#   - Shows both preferences AND aversions
#   - Transparent scoring visible to players
#   - One question influences multiple trait dimensions
#   - Creates nuanced profiles, not binary categories


# Magic Type Questions
- id: healing-magic
  text: "Do you want to heal and protect your allies?"
  category: combat-style
  answers:
    "yes":
      healing-magic: +4        # Direct preference for healing/support
      utility-magic: +1        # Support often includes utility spells
      damage-magic: -2         # Moderate opposition to offensive magic
    "maybe":
      healing-magic: +1        # Weak preference
      utility-magic: +2        # Leans more toward utility
      versatile-magic: +1      # Flexibility in approach
    "no":
      healing-magic: -2        # Rejection of healing role
      damage-magic: +2         # Likely prefers offensive spells
      control-magic: +1        # Alternative support style
    dont-know: {}

- id: magic-interest
  text: "Are you interested in using magic?"
  category: magic-preference
  answers:
    "yes":
      versatile-magic: +4      # Broad magical interest
      utility-magic: +1        # General magic includes utility
      damage-magic: +1         # And damage
      healing-magic: +1        # And healing
      control-magic: +1        # And control
      arcane-averse-magic: -4             # Strong opposition to non-magical
    "maybe":
      utility-magic: +2        # Some magical interest, practical
      versatile-magic: +1      # Moderate breadth
      arcane-averse-magic: -1             # Slight away from pure martial
    "no":
      arcane-averse-magic: +4             # Strong preference for non-magical
      versatile-magic: -3      # Strong opposition to magic
      damage-magic: -2         # Against magical damage
      healing-magic: -2        # Against magical healing
      utility-magic: -2        # Against magical utility
    dont-know: {}

- id: destructive-magic
  text: "Do you want to deal damage with spells?"
  category: magic-style
  answers:
    "yes":
      damage-magic: +4         # Direct preference for offensive spells
      versatile-magic: +1      # Damage is part of versatility
      healing-magic: -2        # Moderate opposition to support
    "maybe":
      damage-magic: +1         # Some interest
      versatile-magic: +2      # Flexibility preferred
      utility-magic: +1        # Mixed magical interests
    "no":
      damage-magic: -2         # Not interested in offensive magic
      utility-magic: +2        # Prefer other magic types
      healing-magic: +1        # Maybe support instead
      control-magic: +1        # Or battlefield control
    dont-know: {}

